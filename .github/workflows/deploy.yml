name: Deploy Backend to VPS

on:
  push:
    branches:
      - config-vps

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "."
          target: "/var/www/html/chall-integrobt"
          rm: false

      - name: executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /var/www/html/chall-integrobt/backend
            
            # Instalar dependencias para que Sail tenga su contexto de construcción
            docker run --rm -v $(pwd):/app -w /app composer install --ignore-platform-reqs --no-scripts
            
            if [ ! -f .env ]; then
              cp .env.example .env
              # Inyectar puertos específicos para evitar conflictos en el VPS
              sed -i 's/APP_PORT=80/APP_PORT=8080/g' .env || echo "APP_PORT=8080" >> .env
              sed -i 's/FORWARD_DB_PORT=3306/FORWARD_DB_PORT=3307/g' .env || echo "FORWARD_DB_PORT=3307" >> .env
              sed -i 's/DB_PASSWORD=root/DB_PASSWORD=Lumberjack123/g' .env
            fi
            
            # Forzar recreación con los nuevos puertos
            docker compose down || true
            docker compose up -d --build
            
            # Esperar a que el contenedor esté listo
            sleep 15
            
            docker exec backend-laravel.test-1 php artisan key:generate || true
            docker exec backend-laravel.test-1 php artisan migrate --seed
