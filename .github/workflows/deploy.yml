name: Deploy Backend to VPS

on:
  push:
    branches:
      - config-vps

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          timeout: 60s
          command_timeout: 30m
          source: "backend/**,README.md" 
          target: "/var/www/html/chall-integrobt"
          rm: false

      - name: executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          timeout: 60s
          script: |
            cd /var/www/html/chall-integrobt/backend
            
            # Instalar dependencias para el contexto de build
            docker run --rm -v $(pwd):/app -w /app composer install --ignore-platform-reqs --no-scripts
            
            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            # 1. Configuración de .env Blindada
            sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
            sed -i 's/^DB_PORT=.*/DB_PORT=3306/' .env
            sed -i 's/^DB_DATABASE=.*/DB_DATABASE=challenge_integrobt/' .env
            sed -i 's/^DB_USERNAME=.*/DB_USERNAME=root/' .env
            sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=Lumberjack123/' .env
            
            # 2. CREAR DOCKER-COMPOSE.VPS.YML MAESTRO (Corregido)
            cat <<EOF > docker-compose.vps.yml
            services:
                laravel.test:
                    build:
                        context: ./vendor/laravel/sail/runtimes/8.4
                        dockerfile: Dockerfile
                        args:
                            WWWGROUP: '1000'
                    image: sail-8.4/app
                    network_mode: "service:mysql"
                    environment:
                        WWWUSER: '1000'
                        LARAVEL_SAIL: 1
                    volumes:
                        - '.:/var/www/html'
                    depends_on:
                        - mysql
                mysql:
                    image: 'mysql/mysql-server:8.0'
                    ports:
                        - '8080:80'
                        - '3307:3306'
                    environment:
                        MYSQL_ROOT_PASSWORD: 'Lumberjack123'
                        MYSQL_ROOT_HOST: '%'
                        MYSQL_DATABASE: 'challenge_integrobt'
                        MYSQL_ALLOW_EMPTY_PASSWORD: 1
                    volumes:
                        - 'sail-mysql-vps:/var/lib/mysql'
            volumes:
                sail-mysql-vps:
                    driver: local
            EOF

            # 3. Limpieza profunda
            docker compose -f docker-compose.yml down -v --remove-orphans || true
            docker compose -f docker-compose.vps.yml down -v --remove-orphans || true
            
            # 4. Levantar (Esta vez el build no fallará)
            docker compose -f docker-compose.vps.yml up -d --build
            
            echo "Aguardando estabilidad de la colmena (60s)..."
            sleep 60
            
            docker exec backend-laravel.test-1 php artisan key:generate || true
            docker exec backend-laravel.test-1 php artisan migrate:fresh --seed
