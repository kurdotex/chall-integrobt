name: Deploy Backend to VPS

on:
  push:
    branches:
      - config-vps

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          timeout: 60s
          command_timeout: 30m
          source: "backend/**,README.md,docker-compose.yml" 
          target: "/var/www/html/chall-integrobt"
          rm: false

      - name: executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          timeout: 60s
          script: |
            cd /var/www/html/chall-integrobt/backend
            
            docker run --rm -v $(pwd):/app -w /app composer install --ignore-platform-reqs --no-scripts
            
            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            # 1. Configurar Laravel para hablar a su propio localhost
            sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
            sed -i 's/^DB_PORT=.*/DB_PORT=3306/' .env
            sed -i 's/^DB_DATABASE=.*/DB_DATABASE=challenge_integrobt/' .env
            sed -i 's/^DB_USERNAME=.*/DB_USERNAME=root/' .env
            sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=Lumberjack123/' .env
            
            # 2. Hackear docker-compose: Laravel comparte red con MySQL
            sed -i '/laravel.test:/a \        network_mode: "service:mysql"' docker-compose.yml
            
            # 3. Mapear puertos de la API (8080) en el contenedor de MySQL (que ahora es el host de red)
            # Buscamos la sección de puertos de mysql y le inyectamos el 8080
            sed -i '/mysql:/,/ports:/ s/ports:/ports:\n            - "8080:80"/' docker-compose.yml
            
            # 4. Limpiar y refrescar
            docker compose down -v --remove-orphans || true
            
            # 5. Levantar
            docker compose up -d --build
            
            echo "Conexión atómica establecida. Esperando estabilidad (60s)..."
            sleep 60
            
            docker exec backend-laravel.test-1 php artisan key:generate || true
            docker exec backend-laravel.test-1 php artisan migrate:fresh --seed
