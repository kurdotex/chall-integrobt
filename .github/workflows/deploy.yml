name: Deploy Backend to VPS

on:
  push:
    branches:
      - config-vps

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          timeout: 60s
          command_timeout: 30m
          source: "backend/**,README.md,docker-compose.yml" 
          target: "/var/www/html/chall-integrobt"
          rm: false

      - name: executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          timeout: 60s
          script: |
            cd /var/www/html/chall-integrobt/backend
            
            docker run --rm -v $(pwd):/app -w /app composer install --ignore-platform-reqs --no-scripts
            
            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            # Configuraciones base
            sed -i 's/\${APP_PORT:-80}:80/8080:80/g' docker-compose.yml
            sed -i 's/^DB_HOST=.*/DB_HOST=mysql/' .env
            sed -i 's/^DB_PORT=.*/DB_PORT=3306/' .env
            sed -i 's/^DB_DATABASE=.*/DB_DATABASE=challenge_integrobt/' .env
            sed -i 's/^DB_USERNAME=.*/DB_USERNAME=root/' .env
            sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=Lumberjack123/' .env
            
            # Limpieza total para asegurar red limpia
            docker compose down -v --remove-orphans || true
            
            # Levantar sistema
            docker compose up -d --build
            
            echo "Buscando señal de MySQL en la red interna..."
            
            # BUCLE DE ESPERA INTELIGENTE: Reintenta hasta 12 veces (1 minuto max)
            for i in {1..12}; do
              if docker exec backend-laravel.test-1 ping -c 1 mysql > /dev/null 2>&1; then
                echo "¡Conexión de red establecida!"
                break
              fi
              echo "Red no lista... reintentando en 5s ($i/12)"
              sleep 5
            done

            # Darle 10 segundos extra para que el proceso de MySQL termine de arrancar los sockets
            sleep 10
            
            docker exec backend-laravel.test-1 php artisan key:generate || true
            docker exec backend-laravel.test-1 php artisan migrate:fresh --seed
