name: Deploy Backend to VPS

on:
  push:
    branches:
      - config-vps

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "."
          target: "/var/www/html/chall-integrobt"
          rm: false

      - name: executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /var/www/html/chall-integrobt/backend
            
            # Instalar dependencias
            docker run --rm -v $(pwd):/app -w /app composer install --ignore-platform-reqs --no-scripts
            
            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            # Asegurar que el puerto sea el 8080 incluso si falla el .env
            sed -i 's/\${APP_PORT:-80}:80/8080:80/g' docker-compose.yml
            
            # Credenciales básicas
            sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=Lumberjack123/' .env
            
            # Limpiar rastro anterior
            docker compose down --remove-orphans || true
            
            # Levantar sistema
            docker compose up -d --build
            
            sleep 25
            
            docker exec backend-laravel.test-1 php artisan key:generate || true
            docker exec backend-laravel.test-1 php artisan migrate --seed
