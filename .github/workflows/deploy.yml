name: Deploy Backend to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: executing remote ssh commands using password
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            mkdir -p /var/www/html/chall-integrobt
            cd /var/www/html/chall-integrobt
            if [ ! -d ".git" ]; then
              git clone https://github.com/kurdotex/chall-integrobt.git .
            else
              git pull origin master
            fi
            cd backend
            cp .env.example .env
            sed -i 's/DB_PASSWORD=root/DB_PASSWORD=Lumberjack123/g' .env
            docker compose up -d
            docker exec backend-laravel.test-1 php artisan key:generate
            docker exec backend-laravel.test-1 php artisan migrate --seed
