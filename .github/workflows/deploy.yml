name: Deploy Backend to VPS

on:
  push:
    branches:
      - config-vps

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          timeout: 60s
          command_timeout: 30m
          source: "backend/**,README.md,docker-compose.yml" 
          target: "/var/www/html/chall-integrobt"
          rm: false

      - name: executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          timeout: 60s
          script: |
            cd /var/www/html/chall-integrobt/backend
            
            docker run --rm -v $(pwd):/app -w /app composer install --ignore-platform-reqs --no-scripts
            
            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            # 1. Forzar puerto 8080 en App y 3307 en MySQL (Mapeo externo)
            sed -i 's/\${APP_PORT:-80}:80/8080:80/g' docker-compose.yml
            sed -i 's/\${FORWARD_DB_PORT:-33060}:3306/3307:3306/g' docker-compose.yml
            
            # 2. Configurar Laravel para conectar vía Gateway de Docker
            # Esto evita depender del DNS interno que está fallando
            sed -i 's/^DB_HOST=.*/DB_HOST=172.17.0.1/' .env
            sed -i 's/^DB_PORT=.*/DB_PORT=3307/' .env
            sed -i 's/^DB_DATABASE=.*/DB_DATABASE=challenge_integrobt/' .env
            sed -i 's/^DB_USERNAME=.*/DB_USERNAME=root/' .env
            sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=Lumberjack123/' .env
            
            # 3. Limpiar y refrescar
            docker compose down -v --remove-orphans || true
            
            # 4. Levantar
            docker compose up -d --build
            
            echo "Esperando a MySQL en el Bridge (60s)..."
            sleep 60
            
            docker exec backend-laravel.test-1 php artisan key:generate || true
            
            # 5. Ejecutar migración apuntando al host externo desde adentro
            docker exec backend-laravel.test-1 php artisan migrate:fresh --seed
